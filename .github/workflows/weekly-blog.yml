name: Weekly Blog Post

on:
  schedule:
    - cron: '0 13 * * 1'  # Every Monday at 9 AM EST
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Commit and push new post
        run: |
          git config user.name "Kiyomi Blog Agent"
          git config user.email "biz@jwatenterprisesinc.com"
          git add blog/
          git diff --staged --quiet || git commit -m "Weekly blog post — $(date +'%B %d, %Y')"
          git push
